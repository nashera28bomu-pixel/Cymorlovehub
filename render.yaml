# ─── render.yaml ─────────────────────────────────────────────────────────────
# Auto-deploy config for Render.com
# Push this file to your GitHub repo — Render reads it automatically.

services:
  - type: web
    name: smiley-cymor-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_NAME
        value: Smiley Cymor Bot
      - key: OWNER_NAME
        value: Legendary Smiley Cymor
      - key: MOTTO
        value: Always a winner
      - key: FOOTER
        value: Powered by Cymor Tech Services
      - key: PREFIX
        value: "."
      - key: PORT
        value: "3000"
      - key: SESSION_FOLDER
        value: ./auth_info
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      # ── Add these manually in Render dashboard (keep secret): ──
      # GROQ_API_KEY
      # ANTHROPIC_API_KEY
      # WEATHER_API_KEY
      # OWNER_NUMBER
      # BOT_NUMBER
