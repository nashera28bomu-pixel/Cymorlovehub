<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cymor Love Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #1a0606; color: white; overflow: hidden; }

        .heart { position: fixed; bottom: -10px; font-size: 20px; animation: floatUp 6s linear infinite; color: #ff4d6d; pointer-events: none; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-110vh) scale(1.5); } }

        .hero { height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px; }
        .hero h1 { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #ff4d6d; }
        .card { margin-top: 20px; background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { padding: 12px; border: none; border-radius: 25px; background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; cursor: pointer; }

        .letterPage { display: none; height: 100vh; justify-content: center; align-items: center; }
        .letter { background: white; color: #333; padding: 30px; border-radius: 10px; max-width: 600px; width: 90%; background-size: cover; background-position: center; z-index: 5; }
        .letter h1 { font-family: 'Great Vibes', cursive; color: #b30000; }

        .confetti { position: fixed; width: 10px; height: 10px; background: red; top: -10px; animation: fall 3s linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }

        .footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 0.8rem; color: #ffafbd; z-index: 10; }
        .footer a { color: white; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/11/03/audio_6f9b3c4f0d.mp3?filename=romantic-love-ambient-124008.mp3" type="audio/mpeg">
</audio>

<div class="hero" id="home">
    <h1>Cymor Love Hub💌</h1>
    <div class="card">
        <input id="sender" placeholder="Your Name">
        <input id="recipient" placeholder="Partner's Name">
        <select id="purpose">
            <option value="date">Date</option>
            <option value="apology">Apology</option>
            <option value="anniversary">Anniversary</option>
            <option value="birthday">Birthday</option>
            <option value="missyou">Miss You</option>
        </select>
        <input type="file" id="imageUpload">
        <button onclick="generateLink()">Create Link ❤️</button>
        <input id="linkField" style="margin-top:10px;display:none;">
        <button onclick="copyLink()">Copy Link</button>
    </div>
</div>

<div class="letterPage" id="letterPage">
    <div class="letter" id="letter">
        <h1 id="title"></h1>
        <p id="body" style="white-space: pre-wrap;"></p>
        <div style="text-align:center;margin-top:20px;">
            <button onclick="yes()">Yes ❤️</button>
            <button id="noBtn" onmouseover="moveNo()">No 😅</button>
        </div>
    </div>
</div>

<div class="footer" id="footer">
    © CymorTechServices 2026. Site created by the legendary Smiley Cymor. <br>
    Contact admin: <a href="https://wa.me/254113821327" target="_blank">0113821327</a>
</div>

<script>
const templates = {
    date: `Can you feel how much you have been on my mind lately? Do you know how your smile lights up my darkest days? Is it possible for someone to be as special as you? Can you imagine us spending a peaceful evening together? Why does my heart race whenever I think of your laugh? Could we create beautiful memories that last a lifetime? Do you want to see what happens when we give this a chance? Is it time for me to show you how much you mean to me? Can you trust me to make every moment worth your while? Shall we try to build something truly magical together? Are you ready to let our story begin? Would you honor me by going on a date with me?`,
    apology: `Can you forgive the pain that my actions have caused you? Is it possible for you to understand how heavy this weighs on my heart? Do you know how much I regret hurting someone as amazing as you? Can you see how deeply I have reflected on where I went wrong? Will you believe that I want to offer you the respect you deserve? Is there any way for me to prove that I am changing for the better? Can you imagine us rebuilding our connection with patience? Do you think we could find our way back to the happiness we once shared? Is my sincerity enough to soften the hurt I caused? Can you hear the honesty in my voice as I reach out to you? Will you give me a chance to make things right? Can you find it in your heart to forgive me and start again?`,
    anniversary: `Can you believe how far we have come together since it all began? Do you realize how much gratitude I feel for every moment with you? Has there ever been a time when you weren't my greatest blessing? Do you know that you are my strength during the hardest times? Is it possible to cherish memories as much as I cherish ours? Do you feel that being with you truly feels like being home? Can you see that you have taught me what real love means? Why am I so lucky to have found someone as kind as you? Shall we keep building this amazing journey for years to come? Is there anything better than growing old beside you? Does the future look brighter whenever I picture us together? Will you continue this beautiful journey with me for many more years?`,
    birthday: `Can you feel how special today is because of your presence in the world? Do you know how much light you bring into every life you touch? Is it possible to be as kind and genuine as you are? Can you see why I feel so lucky to experience your energy? Do you realize how much your smile makes my life better? Should we celebrate every single part of what makes you who you are? Can you feel how much you inspire everyone around you? Is today the perfect day to remind you of your worth? Do you know that you deserve all the joy in this universe? Can I be the one to make this birthday your most memorable yet? Will you let me celebrate you the way you truly deserve? Can I be a part of making your new chapter the best one yet?`,
    missyou: `Can you feel the emptiness I have felt since you were last near? Is it possible for the days to feel this long without you? Why does everything around me remind me of your beautiful soul? Do you know how much I miss the sound of your voice? Can you imagine how quiet my nights feel without your laughter? Have you realized how much of my happiness comes from your presence? Do you know I spend my time replaying our memories in my head? Is there any way I could reach out and pull you closer right now? Do you feel like a part of me is missing when we are apart? Why is it so hard to wait until the moment I see you again? Can you carry me in your thoughts just as I carry you? Do you feel the same deep longing that I feel for you?`
};

function playMusic() {
    const m = document.getElementById("music");
    m.play().catch(e => console.log("Waiting for user interaction"));
}

document.body.addEventListener("click", playMusic, { once: true });

const params = new URLSearchParams(location.search);
if(params.has("to")) {
    document.getElementById("home").style.display = "none";
    document.getElementById("letterPage").style.display = "flex";
    document.getElementById("footer").style.display = "none"; 
    
    document.getElementById("title").innerText = "Dear " + params.get("to") + ",";
    document.getElementById("body").innerText = params.get("msg") + "\n\nLove,\n" + params.get("from");
    
    if(params.get("bg")) {
        const letter = document.getElementById("letter");
        letter.style.backgroundImage = `url(${params.get("bg")})`;
        letter.style.color = "white";
        letter.style.textShadow = "0px 0px 5px rgba(0,0,0,0.5)";
    }
}

function generateLink() {
    const s = document.getElementById("sender").value;
    const r = document.getElementById("recipient").value;
    const msg = templates[document.getElementById("purpose").value];
    const file = document.getElementById("imageUpload").files[0];

    if(file) {
        const reader = new FileReader();
        reader.onload = e => createURL(s, r, msg, e.target.result);
        reader.readAsDataURL(file);
    } else {
        createURL(s, r, msg, "");
    }
}

function createURL(s, r, msg, img) {
    const url = `${location.origin}${location.pathname}?to=${encodeURIComponent(r)}&from=${encodeURIComponent(s)}&msg=${encodeURIComponent(msg)}&bg=${encodeURIComponent(img)}`;
    const field = document.getElementById("linkField");
    field.style.display = "block";
    field.value = url;
}

function copyLink() {
    navigator.clipboard.writeText(document.getElementById("linkField").value);
    alert("Copied ❤️.Now share to your patner.");
}

function moveNo() {
    const btn = document.getElementById("noBtn");
    btn.style.position = "fixed";
    btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
    btn.style.top = Math.random() * (window.innerHeight - 100) + "px";
}

function yes() {
    for(let i=0; i<50; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
    }
    alert("I knew it 😍❤️.Thanks for always choosing us,i really appreciate it.");
}

setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 500);
</script>
</body>
</html>
