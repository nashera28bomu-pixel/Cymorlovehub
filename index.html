<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cymor Love Hub.</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Montserrat',sans-serif;
    background:#1a0606;
    color:white;
    overflow:hidden;
}

/* HEARTS */
.heart{
    position:fixed;
    bottom:-10px;
    font-size:20px;
    animation: floatUp 6s linear infinite;
    color:#ff4d6d;
}
@keyframes floatUp{
    0%{transform:translateY(0) scale(1);}
    100%{transform:translateY(-110vh) scale(1.5);}
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-family:'Great Vibes',cursive;
    font-size:3rem;
    color:#ff4d6d;
}

.card{
    margin-top:20px;
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:500px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

button{
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    cursor:pointer;
}

/* LETTER */
.letterPage{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.letter{
    background:white;
    color:#333;
    padding:30px;
    border-radius:10px;
    max-width:600px;
    width:90%;
    background-size:cover;
    background-position:center;
}

.letter h1{
    font-family:'Great Vibes',cursive;
    color:#b30000;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    background:red;
    top:-10px;
    animation:fall 3s linear forwards;
}
@keyframes fall{
    to{transform:translateY(100vh) rotate(360deg);}
}

/* FOOTER */
.footer{
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:0.8rem;
    color:#ffafbd;
}
.footer a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- FIXED MUSIC -->
<audio id="music" loop autoplay muted>
<source src="https://cdn.pixabay.com/download/audio/2022/11/03/audio_6f9b3c4f0d.mp3?filename=romantic-love-ambient-124008.mp3">
</audio>

<div class="hero" id="home">
    <h1>Cymor Love Hub. 💌</h1>

    <div class="card">
        <input id="sender" placeholder="Your Name">
        <input id="recipient" placeholder="Partner's Name">

        <select id="purpose">
            <option value="date">Date</option>
            <option value="apology">Apology</option>
            <option value="anniversary">Anniversary</option>
            <option value="birthday">Birthday</option>
            <option value="missyou">Miss You</option>
        </select>

        <input type="file" id="imageUpload">

        <button onclick="generateLink()">Create Link ❤️</button>

        <input id="linkField" style="margin-top:10px;display:none;">
        <button onclick="copyLink()">Copy Link</button>
    </div>
</div>

<div class="letterPage" id="letterPage">
    <div class="letter" id="letter">
        <h1 id="title"></h1>
        <p id="body"></p>
        <div style="text-align:center;margin-top:20px;">
            <button onclick="yes()">Yes ❤️</button>
            <button id="noBtn" onmouseover="moveNo()">No 😅</button>
        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    © CymorTechServices 2026. Site created by the legendary Smiley Cymor. <br>
    Contact admin: 
    <a href="https://wa.me/254113821327" target="_blank">0113821327</a>
</div>

<script>

/* 12 SENTENCE MESSAGES */
const templates = {
date:`I have been thinking about you every single moment lately and it feels like you are always on my mind. Your smile has a way of lighting up even my darkest days and I cannot ignore how special that feels. Every time I imagine spending time with you my heart races with excitement and anticipation. I find myself wondering what it would be like to share a beautiful evening together somewhere peaceful. The thought of laughing with you and creating memories together feels like something truly magical. I want to give you my time, my attention, and a moment that you will always remember. Life feels better whenever I imagine you being part of it in a deeper way. I believe that something beautiful could grow if we give it a chance. You deserve something thoughtful and genuine and I want to be that for you. I promise to make every moment worth your while and full of happiness. So here I am gathering the courage to ask you something that means a lot to me. Would you honor me by going on a date with me?`,

apology:`I have been thinking deeply about everything that happened and it weighs heavily on my heart. I regret the pain that my actions caused and I wish I could turn back time to make things right. You mean so much to me and it hurts knowing that I made you feel otherwise. I have taken time to reflect and I truly understand where I went wrong. You deserve respect, care, and honesty from me at all times. I never want to be the reason behind your sadness again. I miss the connection we shared and the happiness we brought into each other’s lives. I am ready to grow and become better for both of us. I want to rebuild what we had with patience and sincerity. I am willing to listen, understand, and do whatever it takes to fix this. My heart is still yours and I hope yours still has space for me. Can you find it in your heart to forgive me and give us another chance?`,

anniversary:`As I look back on everything we have shared together my heart fills with gratitude and joy. Every moment with you has been a blessing that I will never take for granted. You have been my strength during hard times and my happiness during the best times. I cherish every memory we have created and every laugh we have shared. Being with you feels like home no matter where we are in the world. You have shown me what true love really means in ways I never imagined. I admire your heart, your kindness, and everything that makes you who you are. I am so grateful that life brought us together in such a beautiful way. I want to continue building this amazing journey with you forever. There is so much more I want us to experience together. Today is a reminder of how far we have come and how strong we are. Will you continue this beautiful journey with me for many more years to come?`,

birthday:`Today is a special day because it marks the moment the world was blessed with someone as amazing as you. You bring so much light and positivity into the lives of everyone around you. I feel incredibly lucky to be one of the people who gets to experience your presence. Your kindness, your smile, and your energy make everything better. I hope today brings you as much happiness as you bring into my life every day. You deserve love, joy, and success in everything you do. I admire everything about you and the way you carry yourself. You inspire me more than you probably realize. I want to be there for many more birthdays and celebrate every moment with you. You are truly one of a kind and incredibly special. I hope this new chapter brings even more blessings into your life. Can I be part of making your birthday even more memorable this year?`,

missyou:`Lately I have been feeling the emptiness that comes from not having you close to me. Everything reminds me of you and the moments we have shared together. I miss your voice, your laugh, and the way you make everything feel right. Days feel longer and nights feel quieter without you around. I never realized how much of my happiness comes from simply being with you. I find myself replaying our memories over and over again in my mind. I wish I could reach out and bring you closer to me right now. You have become such an important part of my life. I cannot wait for the moment I get to see you again. Until then I carry you in my thoughts every single day. My heart feels incomplete without your presence beside me. Do you feel the same way about missing me too?`
};

/* FIXED MUSIC AUTOPLAY */
window.addEventListener("load", () => {
    const m = document.getElementById("music");
    m.play().then(()=>{
        m.muted = false;
    }).catch(()=>{});
});

document.body.addEventListener("click", () => {
    const m = document.getElementById("music");
    m.muted = false;
    m.play();
}, { once:true });

/* HEARTS */
setInterval(()=>{
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerText="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(10+Math.random()*20)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
},500);

/* LINK */
function generateLink(){
    const s=sender.value;
    const r=recipient.value;
    const msg=templates[purpose.value];

    const file=imageUpload.files[0];

    if(file){
        const reader=new FileReader();
        reader.onload=e=>createURL(s,r,msg,e.target.result);
        reader.readAsDataURL(file);
    }else{
        createURL(s,r,msg,"");
    }
}

function createURL(s,r,msg,img){
    const url=`${location.origin}${location.pathname}?to=${encodeURIComponent(r)}&from=${encodeURIComponent(s)}&msg=${encodeURIComponent(msg)}&bg=${encodeURIComponent(img)}`;
    linkField.style.display="block";
    linkField.value=url;
}

/* COPY */
function copyLink(){
    navigator.clipboard.writeText(linkField.value);
    alert("Copied ❤️.Now share the link with your patner.");
}

/* LOAD LETTER */
const params=new URLSearchParams(location.search);
if(params.has("to")){
    home.style.display="none";
    letterPage.style.display="flex";

    title.innerText="Dear "+params.get("to")+",";
    body.innerText=params.get("msg")+"\n\nLove,\n"+params.get("from");

    if(params.get("bg")){
        letter.style.backgroundImage=`url(${params.get("bg")})`;
        letter.style.color="white";
    }

    document.getElementById("music").play().catch(()=>{});
}

/* FIXED NO BUTTON */
function moveNo(){
    const btn = document.getElementById("noBtn");
    const maxX = window.innerWidth - 100;
    const maxY = window.innerHeight - 100;

    btn.style.position="fixed";
    btn.style.left = Math.random() * maxX + "px";
    btn.style.top = Math.random() * maxY + "px";
}

/* CONFETTI */
function yes(){
    for(let i=0;i<50;i++){
        const c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
    alert("I knew it 😍❤️.Thank you for always choosing us.I really appreciate.");
}

</script>
</body>
</html>
