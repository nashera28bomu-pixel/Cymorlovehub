<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cymor Love Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(circle, #2d0b10, #1a0606);
    color: #fff;
    margin: 0;
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
}

/* FLOATING HEARTS */
.heartFloat {
    position: fixed;
    bottom: -20px;
    font-size: 18px;
    animation: floatUp 6s linear infinite;
    color: #ff4d6d;
    pointer-events: none;
}
@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
}

.card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 450px;
    border: 1px solid rgba(255, 77, 109, 0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #444;
    border-radius: 10px;
    background: #000;
    color: #fff;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}
button:hover { background: #e63950; transform: scale(1.02); }

.hidden { display: none; }

.envelope {
    cursor: pointer;
    text-align: center;
    font-size: 1.5rem;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

.letter {
    background: #fff;
    color: #333;
    padding: 40px;
    border-radius: 5px;
    width: 90%;
    max-width: 500px;
    position: relative;
    line-height: 1.6;
    background-size: cover;
    background-position: center;
}

.typewriter {
    min-height: 150px;
    border-right: 2px solid #ff4d6d;
    padding-right: 5px;
}

.heart {
    font-size: 50px;
    animation: heartbeat 1.5s infinite;
    display: inline-block;
}

@keyframes heartbeat {
    0% { transform: scale(1); }
    15% { transform: scale(1.3); }
    30% { transform: scale(1); }
    45% { transform: scale(1.15); }
    60% { transform: scale(1); }
}

footer {
    margin-top: 20px;
    font-size: 0.8rem;
    opacity: 0.7;
    text-align: center;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://files.catbox.moe/8c9z1r.mp3" type="audio/mpeg">
</audio>

<div class="card" id="home">
<div style="text-align:center;"><span class="heart">❤️</span></div>

<h2 style="font-family: 'Great Vibes'; font-size: 2.5rem; text-align: center; color: #ff4d6d;">Cymor Love 2.0</h2>

<input id="sender" placeholder="Your Name">
<input id="recipient" placeholder="Recipient's Name">

<select id="purpose">
<option value="date">The Perfect Date</option>
<option value="missyou">Deepest Missing You</option>
<option value="apology">Sincere Apology</option>
<option value="anniversary">Anniversary Reflection</option>
<option value="birthday">Birthday Celebration</option>
<option value="proposal">Relationship Proposal</option>
</select>

<input type="file" id="imageUpload">

<button onclick="generateLink()">Generate Secret Letter</button>

<div id="linkContainer" class="hidden">
<input id="linkField" readonly>
<button onclick="copyLink()" style="background:#4CAF50;">Copy Link</button>
</div>

<button onclick="alert('Send any amount to M-Pesa: 0113821327. Your donation is appreciated!')" style="background:#0088cc; font-size: 0.8rem;">
☕ Buy the Developer a Coffee
</button>
</div>

<div id="viewPage" class="hidden" style="text-align:center; width: 100%;">
<div id="envelope" class="envelope" onclick="openLetter()">
💌 Click to reveal your secret message from <span id="envSender"></span>
</div>

<div id="letter" class="letter hidden" style="margin: 0 auto;">
<h3 id="title"></h3>
<p id="bodyText" class="typewriter"></p>

<textarea id="replyBox" placeholder="Write your heart back..."></textarea>
<button onclick="sendReply()">Send Reply via WhatsApp</button>
</div>
</div>

<footer>
CymorTechServices2026.|Site made by the legendary Smiley Cymor<br>
Contact Creator: 0113821327
</footer>

<script>
// HEARTS ANIMATION
setInterval(()=>{
    const h = document.createElement("div");
    h.className = "heartFloat";
    h.innerText = "❤";
    h.style.left = Math.random()*100+"vw";
    h.style.fontSize = (10+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},500);

// AUDIO AUTO PLAY
function playMusic(){
    const m=document.getElementById("music");
    m.play().catch(()=>{});
}
document.body.addEventListener("click",playMusic,{once:true});
document.body.addEventListener("touchstart",playMusic,{once:true});

// MESSAGE BUILDER (unchanged)
const buildMessage = (type) => {
const sentences = {
date:["I’ve been thinking of you constantly.","You bring such light into my world.","I love the way we talk for hours.","Your smile is my favorite sight.","I want to take you somewhere special.","You make my heart beat faster.","Life is better with you near.","I treasure every moment we share.","I feel a deep connection to you.","You are truly one of a kind.","I can't stop daydreaming about us.","Would you go on a date with me?"],
missyou:["The house feels too quiet today.","I keep looking for your face.","My phone feels empty without your text.","I miss the sound of your laugh.","Time moves so slowly without you.","I find myself checking our chats.","Everything reminds me of you.","My days feel incomplete and hollow.","I am counting the days until we meet.","Your absence is a heavy burden.","I crave your warmth right now.","Do you miss me as much as I miss you?"],
apology:["I have been reflecting on things.","I know I let you down.","My actions do not reflect my love.","I am truly sorry for the pain.","Please look past my mistakes.","I value our bond above all else.","I hate that I caused you hurt.","I want to make things right.","My heart is heavy with regret.","Can we find our way back?","I promise to be better for you.","Will you forgive me and let me make it up to you?"],
anniversary:["We have come so far together.","Looking back makes me smile.","You have been my rock throughout.","I am proud of what we built.","Our journey is my favorite story.","I love who we are becoming.","Every year gets better with you.","You are the best part of my life.","I am so lucky to have you.","My heart is yours forever.","We have so many memories now.","Are you ready for many more years together?"],
birthday:["It is a special day today.","The world is better because you are in it.","You deserve all the joy today.","I am so happy to celebrate you.","You are aging like fine wine.","I hope your dreams come true.","I am honored to be by your side.","Your light makes everyone happy.","I prepared something special for you.","You are my favorite human being.","I am sending you all my love.","What is your biggest wish for this year?"],
proposal:["I have known for a long time.","You are the one I want to build something real with.","My life feels better when you're part of it.","I want us to grow together.","You mean more to me than I can explain.","I want to share moments, laughs, and life with you.","You make everything feel right.","I feel peace when I think of us.","I want to call you mine.","You are special in ways I can't ignore.","I see something real with you.","Will you be in a relationship with me?"]
};
return sentences[type].join(" ");
};

// GENERATE LINK WITH IMAGE
function generateLink(){
const s=btoa(sender.value);
const r=btoa(recipient.value);
const m=btoa(buildMessage(purpose.value));

const file=imageUpload.files[0];
if(file){
const reader=new FileReader();
reader.onload=e=>{
const img=btoa(e.target.result);
createURL(s,r,m,img);
};
reader.readAsDataURL(file);
}else{
createURL(s,r,m,"");
}
}

function createURL(s,r,m,img){
const url=`${location.origin}${location.pathname}?f=${s}&t=${r}&m=${m}&bg=${img}`;
linkField.value=url;
linkContainer.classList.remove("hidden");
}

// LOAD
const params=new URLSearchParams(location.search);
if(params.has("m")){
home.classList.add("hidden");
viewPage.classList.remove("hidden");

envSender.innerText=atob(params.get("f"));
title.innerText="Dear "+atob(params.get("t"))+",";

if(params.get("bg")){
letter.style.backgroundImage=`url(${atob(params.get("bg"))})`;
letter.style.color="white";
}
}

// OPEN LETTER
function openLetter(){
playMusic();
envelope.classList.add("hidden");
letter.classList.remove("hidden");

const msg=atob(params.get("m"));
let i=0;
const interval=setInterval(()=>{
bodyText.innerText+=msg[i];
i++;
if(i>=msg.length)clearInterval(interval);
},40);
}

// REPLY
function sendReply(){
const reply=replyBox.value;
const senderName=atob(params.get("f"));
window.open(`https://wa.me/254113821327?text=Reply%20to%20${senderName}:%20${encodeURIComponent(reply)}`);
}

// COPY
function copyLink(){
navigator.clipboard.writeText(linkField.value);
alert("Link copied! Share it ❤️");
}
</script>

</body>
</html>
